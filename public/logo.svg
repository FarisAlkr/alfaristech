<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e68c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>

    <!-- Knight body gradient - navy blue -->
    <linearGradient id="knight-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4a7e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2847;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Cream gradient for text -->
    <linearGradient id="cream-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e4dc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Knight chess piece - scaled up -->
  <g transform="translate(5, 5) scale(1.1)" filter="url(#shadow)">
    <!-- Knight silhouette -->
    <path d="M45 85 L45 78 C45 75 47 72 50 70 L50 65 C50 60 48 55 45 52 C42 49 40 45 40 40 C40 30 45 22 52 18 C55 16 58 15 62 15 C66 15 70 17 73 20 C78 25 80 32 80 40 C80 45 78 50 75 54 C72 58 70 62 70 67 L70 70 C73 72 75 75 75 78 L75 85 L45 85 Z M42 88 L78 88 L80 92 L40 92 L42 88 Z"
          fill="url(#knight-gradient)"
          stroke="url(#gold-gradient)"
          stroke-width="1.2"/>

    <!-- Circuit lines on knight -->
    <g filter="url(#glow)">
      <path d="M52 25 L58 25 M55 22 L55 28 M62 24 L62 35 M58 32 L68 32 M65 28 L65 42 M50 38 L56 38 M53 35 L53 48 M58 45 L68 45 M65 42 L65 52 M55 55 L62 55 M58 52 L58 60 M68 30 L74 30 M71 27 L71 38 M50 60 L56 60 M53 57 L53 68"
            stroke="url(#gold-gradient)"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"/>

      <!-- Circuit nodes -->
      <circle cx="55" cy="25" r="1.8" fill="url(#gold-gradient)"/>
      <circle cx="65" cy="32" r="1.8" fill="url(#gold-gradient)"/>
      <circle cx="58" cy="45" r="1.8" fill="url(#gold-gradient)"/>
      <circle cx="71" cy="30" r="1.8" fill="url(#gold-gradient)"/>
      <circle cx="53" cy="60" r="1.8" fill="url(#gold-gradient)"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(105, 38)">
    <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="38" dominant-baseline="middle">
      <tspan fill="url(#cream-gradient)">Alfaris</tspan><tspan fill="url(#gold-gradient)">Tech</tspan>
    </text>
    <text x="2" y="28" font-family="Arial, sans-serif" font-size="11" fill="url(#gold-gradient)" letter-spacing="0.5">AI, Dev &amp; Education Solutions</text>
  </g>
</svg>
